version: "3.9"

services:

  api:
    build: .
    container_name: api_chat
    ports:
      - "8000:8000"

    depends_on:
      - db

    volumes:
      - .:/app

  db:
    image: postgres:16
    container_name: postgres_chat

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_db

    ports:
      - "5432:5432"