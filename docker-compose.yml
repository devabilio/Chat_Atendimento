services:

  api:
    build: .
    container_name: api_chat

    ports:
      - "8000:8000"

    depends_on:
      - db

    volumes:
      - .:/app

    restart: always

  db:
    image: postgres:16
    container_name: postgres_chat

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

volumes:
  postgres_data: